<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Typing Trainer</title>
  <script type="module" crossorigin src="/Typing-Trainer/assets/index-BmBTXhA2.js"></script>
  <link rel="stylesheet" crossorigin href="/Typing-Trainer/assets/index-B7BZfLZE.css">
</head>
<body>
  <div class="app">
    <div class="app-header">
      <div id="streakDisplay" class="streak-counter">Streak: 0</div>
      <h1>Typing Trainer</h1>
      <div class="header-right">
        <span id="timer" class="timer-display">0s</span>
        <button id="settingsBtn" class="icon-btn" title="Settings" aria-label="Settings">&#9881;</button>
      </div>
    </div>

    <div id="chunkDisplay"></div>

    <input
      id="inputField"
      type="text"
      autocomplete="off"
      autofocus
      spellcheck="false"
    />
    <div id="stats">
      <div id="wpm">WPM: 0</div>
      <div id="accuracy">Accuracy: 100%</div>
      <div id="consistency">Consistency: 100%</div>
    </div>
  </div>
</body>
</html>
